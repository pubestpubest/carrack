services:
  web:
    image: ${DOCKER_IMAGE:-pubestpubest/carrack}:latest
    container_name: ${DOCKER_CONTAINER_NAME:-carrack}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
